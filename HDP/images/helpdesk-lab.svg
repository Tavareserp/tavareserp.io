<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Help Desk Lab Environment">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="56" y="62" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Help Desk Lab Environment</text>

  <g font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569" font-weight="600">
    <text x="92" y="132">Incident Queue</text>
    <text x="470" y="132">Resolution Process</text>
  </g>

  <g stroke="#cbd5e1" stroke-width="2">
    <rect x="80" y="150" width="320" height="470" rx="12" fill="#ffedd5"/>
    <rect x="440" y="150" width="680" height="470" rx="12" fill="#ffffff"/>

    <rect x="110" y="200" width="260" height="72" rx="12" fill="#ffffff"/>
    <rect x="110" y="292" width="260" height="72" rx="12" fill="#ffffff"/>
    <rect x="110" y="384" width="260" height="72" rx="12" fill="#ffffff"/>
    <rect x="110" y="476" width="260" height="72" rx="12" fill="#ffffff"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" fill="#1e293b">
    <text x="132" y="245" font-size="20" font-weight="700">👤 User Login Issue</text>
    <text x="132" y="337" font-size="20" font-weight="700">🖨 Printer Offline</text>
    <text x="132" y="429" font-size="20" font-weight="700">📧 Outlook Failure</text>
    <text x="132" y="521" font-size="20" font-weight="700">🌐 VPN Connection</text>

    <text x="470" y="214" font-size="22" font-weight="700">🔧 Workflow</text>
    <text x="470" y="258" font-size="20">1. Validate symptoms and gather logs</text>
    <text x="470" y="302" font-size="20">2. Isolate root cause and impacted services</text>
    <text x="470" y="346" font-size="20">3. Apply fix and verify user operation</text>
    <text x="470" y="390" font-size="20">4. Document incident and prevention notes</text>

    <text x="470" y="462" font-size="22" font-weight="700">📌 Key Outputs</text>
    <text x="470" y="506" font-size="20">- Resolved ticket with closure notes</text>
    <text x="470" y="542" font-size="20">- Updated troubleshooting knowledge base</text>
  </g>
</svg>
