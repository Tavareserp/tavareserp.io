<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="320" viewBox="0 0 1400 320" role="img" aria-label="IT Troubleshooting Workflow">
  <rect width="1400" height="320" fill="#f8fafc"/>
  <text x="40" y="58" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">IT Troubleshooting Workflow</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <g fill="#ffedd5" stroke="#cbd5e1" stroke-width="2">
    <rect x="40" y="130" width="170" height="80" rx="12"/>
    <rect x="230" y="130" width="170" height="80" rx="12"/>
    <rect x="420" y="130" width="170" height="80" rx="12"/>
    <rect x="610" y="130" width="170" height="80" rx="12"/>
    <rect x="800" y="130" width="170" height="80" rx="12"/>
    <rect x="990" y="130" width="170" height="80" rx="12"/>
    <rect x="1180" y="130" width="170" height="80" rx="12"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="20" fill="#1e293b" text-anchor="middle" font-weight="700">
    <text x="125" y="178">1. Identify</text>
    <text x="315" y="178">2. Reproduce</text>
    <text x="505" y="178">3. Diagnose</text>
    <text x="695" y="178">4. Root Cause</text>
    <text x="885" y="178">5. Resolve</text>
    <text x="1075" y="178">6. Validate</text>
    <text x="1265" y="178">7. Document</text>
  </g>

  <g stroke="#64748b" stroke-width="3" marker-end="url(#arrow)">
    <line x1="210" y1="170" x2="230" y2="170"/>
    <line x1="400" y1="170" x2="420" y2="170"/>
    <line x1="590" y1="170" x2="610" y2="170"/>
    <line x1="780" y1="170" x2="800" y2="170"/>
    <line x1="970" y1="170" x2="990" y2="170"/>
    <line x1="1160" y1="170" x2="1180" y2="170"/>
  </g>
</svg>
