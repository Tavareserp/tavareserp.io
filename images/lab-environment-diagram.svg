<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">

<!-- White background -->
<rect width="100%" height="100%" fill="white"></rect>

<style>
.title {
  font-family: Inter, Arial, sans-serif;
  font-size: 32px;
  font-weight: 700;
  fill: #1f2937;
}

.layer {
  font-family: Inter, Arial, sans-serif;
  font-size: 16px;
  fill: #4b5563;
}

.box {
  stroke: #9ca3af;
  stroke-width: 2;
  rx: 14;
  filter: drop-shadow(0px 3px 6px rgba(0,0,0,0.08));
}

.label {
  font-family: Inter, Arial, sans-serif;
  font-size: 18px;
  font-weight: 600;
  fill: #1f2937;
  text-anchor: middle;
  dominant-baseline: middle;
}

.arrow {
  stroke: #6b7280;
  stroke-width: 2;
  marker-end: url(#arrow);
}

</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#6b7280"></path>
</marker>
</defs>

<!-- Title -->
<text x="40" y="50" class="title">Active Directory Lab Architecture</text>

<!-- Layer Labels -->
<text x="80" y="130" class="layer">Network Layer</text>
<text x="80" y="220" class="layer">Server Layer</text>
<text x="80" y="330" class="layer">Client Layer</text>

<!-- Internet -->
<rect x="340" y="100" width="220" height="65" fill="#dbeafe" class="box"></rect>
<text x="450" y="132" class="label">🌐 Internet / Router</text>

<!-- Windows Server -->
<rect x="320" y="195" width="260" height="70" fill="#e9d5ff" class="box"></rect>
<text x="450" y="230" class="label">🖥 Windows Server (AD)</text>

<!-- Clients -->
<rect x="200" y="320" width="240" height="65" fill="#d1fae5" class="box"></rect>
<text x="320" y="352" class="label">💻 Windows 11 Client</text>

<rect x="460" y="320" width="240" height="65" fill="#d1fae5" class="box"></rect>
<text x="580" y="352" class="label">🐧 Linux VM</text>

<!-- Arrows -->
<line x1="450" y1="165" x2="450" y2="195" class="arrow"></line>
<line x1="450" y1="265" x2="450" y2="295" class="arrow"></line>
<line x1="450" y1="295" x2="320" y2="320" class="arrow"></line>
<line x1="450" y1="295" x2="580" y2="320" class="arrow"></line>

</svg>